<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Manager Pro - Sistema Integral de Gestión</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-section { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .bg-solar-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0, transparent 50%);
        }

        .custom-shadow { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-solar-mesh min-h-screen selection:bg-amber-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBIaQoqFI10IQBXVwUDh7bA_0jBVntnZzU",
            authDomain: "solarpro-397be.firebaseapp.com",
            projectId: "solarpro-397be",
            storageBucket: "solarpro-397be.firebasestorage.app",
            messagingSenderId: "107137996727",
            appId: "1:107137996727:web:a03fc9bb9c133321463a32",
            measurementId: "G-E0RV2VSEP7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'solarpro-397be-main';

        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        elements: iconRef.current.querySelectorAll('[data-lucide]'),
                        attrs: { 'stroke-width': strokeWidth, width: size, height: size }
                    });
                }
            }, [name, size, strokeWidth]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [projectTab, setProjectTab] = useState('list');
            const [selectedProjectId, setSelectedProjectId] = useState(null);
            const [selectedStaffId, setSelectedStaffId] = useState(null);
            const [authError, setAuthError] = useState(false);
            
            const [projects, setProjects] = useState([]);
            const [staff, setStaff] = useState([]);
            const [finances, setFinances] = useState([]);
            const [inventory, setInventory] = useState([]);

            // Regla 3: Autenticación obligatoria
            useEffect(() => {
                signInAnonymously(auth).catch(err => {
                    console.error("Auth Fail:", err);
                    if(err.code === 'auth/configuration-not-found') setAuthError(true);
                });
                
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if(u) setIsAuthReady(true);
                });
                return () => unsubscribe();
            }, []);

            // Escuchadores de base de datos (Regla 1 y 3)
            useEffect(() => {
                if (!isAuthReady || !user) return;
                
                const getCol = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);

                const unsubP = onSnapshot(getCol('projects'), s => setProjects(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubS = onSnapshot(getCol('staff'), s => setStaff(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubF = onSnapshot(getCol('finances'), s => setFinances(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubI = onSnapshot(getCol('inventory'), s => setInventory(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                return () => { unsubP(); unsubS(); unsubF(); unsubI(); };
            }, [isAuthReady, user]);

            const stats = useMemo(() => {
                const inc = finances.filter(f => f.type === 'income').reduce((a, c) => a + (Number(c.amount) || 0), 0);
                const exp = finances.filter(f => f.type === 'expense').reduce((a, c) => a + (Number(c.amount) || 0), 0);
                return { 
                    balance: inc - exp, 
                    activeProjects: projects.filter(p => p.status !== 'Terminado').length, 
                    lowStock: inventory.filter(i => i.stock < 5).length 
                };
            }, [finances, projects, inventory]);

            const deleteItem = async (col, id) => {
                if(window.confirm('¿Eliminar este registro permanentemente?')) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', col, id);
                        await deleteDoc(docRef);
                        if (selectedProjectId === id) setSelectedProjectId(null);
                        if (selectedStaffId === id) setSelectedStaffId(null);
                    } catch (err) {
                        console.error("Error al borrar:", err);
                    }
                }
            };

            const currentProject = useMemo(() => projects.find(p => p.id === selectedProjectId), [projects, selectedProjectId]);
            const currentStaff = useMemo(() => staff.find(s => s.id === selectedStaffId), [staff, selectedStaffId]);

            // --- EXCEL ---
            const addExcelRow = async () => {
                if (!selectedProjectId) return;
                const updatedBreakdown = [...(currentProject.breakdown || []), { id: Date.now(), desc: '', qty: 1, cost: 0 }];
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', selectedProjectId), { breakdown: updatedBreakdown });
            };

            const updateExcelRow = async (rowId, field, value) => {
                const updatedBreakdown = currentProject.breakdown.map(r => r.id === rowId ? { ...r, [field]: value } : r);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', selectedProjectId), { breakdown: updatedBreakdown });
            };

            const removeExcelRow = async (rowId) => {
                const updatedBreakdown = currentProject.breakdown.filter(r => r.id !== rowId);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', selectedProjectId), { breakdown: updatedBreakdown });
            };

            // --- STAFF ACTIONS ---
            const handleBlockDate = async () => {
                if (!selectedStaffId) return;
                const date = prompt("Fecha a bloquear (AAAA-MM-DD):");
                if (date) {
                    const staffRef = doc(db, 'artifacts', appId, 'public', 'data', 'staff', selectedStaffId);
                    await updateDoc(staffRef, { unavailableDates: arrayUnion(date) });
                }
            };

            const removeUnavailableDate = async (date) => {
                if (!selectedStaffId) return;
                const staffRef = doc(db, 'artifacts', appId, 'public', 'data', 'staff', selectedStaffId);
                await updateDoc(staffRef, { unavailableDates: arrayRemove(date) });
            };

            const NavItem = ({ id, icon, label }) => (
                <button onClick={() => { setActiveTab(id); setProjectTab('list'); setSelectedProjectId(null); setSelectedStaffId(null); }} className={`flex flex-col md:flex-row items-center gap-2 px-3 py-2 md:px-5 md:py-2.5 rounded-2xl transition-all duration-300 ${activeTab === id ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-slate-400 hover:bg-white'}`}>
                    <Icon name={icon} size={18} />
                    <span className={`text-[10px] md:text-sm font-bold tracking-tight ${activeTab === id ? 'block' : 'hidden md:block'}`}>{label}</span>
                </button>
            );

            const Hero = ({ title, subtitle, icon, color }) => (
                <div className={`relative overflow-hidden rounded-[2.5rem] p-8 md:p-12 mb-10 text-white shadow-2xl ${color} animate-section`}>
                    <div className="relative z-10">
                        <div className="bg-white/20 p-3 rounded-2xl backdrop-blur-md w-fit mb-6"><Icon name={icon} size={32} /></div>
                        <h1 className="text-3xl md:text-5xl font-extrabold mb-4 tracking-tight leading-none text-white">{title}</h1>
                        <p className="text-white/80 text-lg font-medium max-w-xl leading-relaxed">{subtitle}</p>
                    </div>
                    <Icon name={icon} size={400} className="absolute -right-20 -top-20 opacity-10 pointer-events-none" />
                </div>
            );

            if (authError) return (
                <div className="h-screen flex flex-col items-center justify-center p-6 text-center bg-white">
                    <Icon name="alert-triangle" size={64} className="text-rose-500 mb-4" />
                    <h2 className="text-2xl font-black text-slate-800 mb-2">Error de Autenticación</h2>
                    <p className="text-slate-500 max-w-md">Debes activar el método <b>Anónimo</b> en la consola de Firebase (Authentication > Sign-in method).</p>
                    <button onClick={() => window.location.reload()} className="mt-8 px-8 py-3 bg-slate-800 text-white rounded-2xl font-bold">REINTENTAR</button>
                </div>
            );

            if (!isAuthReady) return <div className="h-screen flex items-center justify-center animate-pulse text-slate-300 font-black tracking-widest">CARGANDO SISTEMA...</div>;

            return (
                <div className="min-h-screen pb-32 md:pb-12 md:pt-24">
                    {/* Desktop Nav */}
                    <nav className="fixed top-0 left-0 right-0 h-24 bg-white/70 backdrop-blur-2xl border-b border-slate-100 z-50 hidden md:flex items-center justify-between px-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-amber-500 p-2 rounded-xl text-white shadow-lg"><Icon name="sun" size={24} strokeWidth={2.5} /></div>
                            <span className="text-xl font-black tracking-tighter text-slate-800 uppercase">Solar<span className="text-amber-500">Pro</span></span>
                        </div>
                        <div className="flex gap-1 bg-slate-100/50 p-1.5 rounded-[1.8rem]">
                            <NavItem id="dashboard" icon="layout-dashboard" label="Panel" />
                            <NavItem id="projects" icon="briefcase" label="Proyectos" />
                            <NavItem id="staff" icon="users" label="Equipo" />
                            <NavItem id="finances" icon="dollar-sign" label="Finanzas" />
                            <NavItem id="inventory" icon="package" label="Stock" />
                        </div>
                        <div className="h-10 w-10 rounded-2xl bg-amber-100 border-2 border-white shadow-sm flex items-center justify-center text-[10px] font-black">SIG</div>
                    </nav>

                    {/* Mobile Nav */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-xl bg-white/90 backdrop-blur-2xl border border-white/40 shadow-2xl rounded-[2.5rem] z-50 flex items-center justify-around p-2 md:hidden">
                        <NavItem id="dashboard" icon="layout-dashboard" label="Panel" />
                        <NavItem id="projects" icon="briefcase" label="Proy" />
                        <NavItem id="staff" icon="users" label="Equipo" />
                        <NavItem id="finances" icon="dollar-sign" label="Caja" />
                        <NavItem id="inventory" icon="package" label="Stock" />
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 py-6">
                        
                        {/* 1. DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="animate-section">
                                <Hero title="Resumen Ejecutivo" subtitle="Estado de operaciones y salud financiera de la empresa." icon="zap" color="bg-gradient-to-br from-amber-500 via-orange-500 to-rose-600" />
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="bg-white p-10 rounded-[2.5rem] border shadow-sm group hover:shadow-2xl transition-all">
                                        <div className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl w-fit mb-6 transition-all group-hover:bg-emerald-500 group-hover:text-white"><Icon name="trending-up" size={28} /></div>
                                        <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">Caja Total</p>
                                        <h3 className="text-5xl font-black text-slate-800 tracking-tighter">${stats.balance.toLocaleString()}</h3>
                                    </div>
                                    <div className="bg-white p-10 rounded-[2.5rem] border shadow-sm group hover:shadow-2xl transition-all">
                                        <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl w-fit mb-6 transition-all group-hover:bg-blue-500 group-hover:text-white"><Icon name="briefcase" size={28} /></div>
                                        <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">Activos</p>
                                        <h3 className="text-5xl font-black text-slate-800 tracking-tighter">{stats.activeProjects}</h3>
                                    </div>
                                    <div className="bg-white p-10 rounded-[2.5rem] border shadow-sm group hover:shadow-2xl transition-all">
                                        <div className="p-4 bg-rose-50 text-rose-600 rounded-2xl w-fit mb-6 transition-all group-hover:bg-rose-500 group-hover:text-white"><Icon name="alert-circle" size={28} /></div>
                                        <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">Alertas</p>
                                        <h3 className="text-5xl font-black text-slate-800 tracking-tighter">{stats.lowStock}</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. PROYECTOS */}
                        {activeTab === 'projects' && (
                            <div className="animate-section">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                                    <h2 className="text-4xl font-black text-slate-800 tracking-tight">Obras</h2>
                                    <div className="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                                        <button onClick={() => setProjectTab('list')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${projectTab === 'list' ? 'bg-amber-500 text-white shadow-lg' : 'text-slate-400'}`}>LISTA</button>
                                        <button onClick={() => setProjectTab('calendar')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${projectTab === 'calendar' ? 'bg-amber-500 text-white shadow-lg' : 'text-slate-400'}`}>CALENDARIO</button>
                                    </div>
                                </div>

                                {projectTab === 'list' && (
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                        <div className="lg:col-span-4">
                                            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 sticky top-28">
                                                <h3 className="text-xl font-black mb-6">Nuevo Proyecto</h3>
                                                <form onSubmit={async (e) => {
                                                    e.preventDefault();
                                                    const fd = new FormData(e.target);
                                                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), {
                                                        client: fd.get('client'), service: fd.get('service'), 
                                                        team: fd.get('team'), date: fd.get('date'), value: Number(fd.get('value')),
                                                        status: 'Pendiente', breakdown: []
                                                    });
                                                    e.target.reset();
                                                }} className="space-y-4">
                                                    <input name="client" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Nombre Cliente" />
                                                    <select name="service" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                                                        <option>Paneles Solares</option>
                                                        <option>Aires Acondicionados</option>
                                                        <option>Calentador Solar</option>
                                                    </select>
                                                    <select name="team" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                                                        <option value="">Seleccionar Técnico...</option>
                                                        {staff.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                                                    </select>
                                                    <input name="value" type="number" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Valor Venta $" />
                                                    <input name="date" type="date" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" />
                                                    <button type="submit" className="w-full py-4 bg-slate-800 text-white font-black rounded-2xl">GUARDAR</button>
                                                </form>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-8 space-y-4">
                                            {projects.map(p => (
                                                <div key={p.id} onClick={() => { setSelectedProjectId(p.id); setProjectTab('excel'); }} className="bg-white p-6 rounded-[2.2rem] border border-slate-50 shadow-sm flex items-center justify-between group hover:shadow-2xl transition-all cursor-pointer">
                                                    <div className="flex items-center gap-6">
                                                        <div className="w-16 h-16 bg-amber-50 text-amber-600 rounded-3xl flex items-center justify-center font-black text-2xl">{p.client?.charAt(0)}</div>
                                                        <div>
                                                            <h4 className="font-black text-xl text-slate-800">{p.client}</h4>
                                                            <p className="text-[10px] font-black text-slate-400 uppercase">{p.service} • {p.date}</p>
                                                            <span className="text-[10px] font-black text-amber-600 uppercase mt-2 block"><Icon name="user" size={10} className="mr-1"/> {p.team}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <div className="text-right">
                                                            <p className="text-[10px] font-black text-slate-300 uppercase">Venta</p>
                                                            <p className="text-lg font-black text-slate-800">${p.value?.toLocaleString()}</p>
                                                        </div>
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); deleteItem('projects', p.id); }} 
                                                            className="p-3 text-slate-200 hover:text-rose-500 transition-colors bg-slate-50 rounded-xl"
                                                        >
                                                            <Icon name="trash-2" />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {projectTab === 'calendar' && (
                                    <div className="bg-white p-8 rounded-[3rem] border shadow-2xl animate-section">
                                        <div className="calendar-grid gap-3">
                                            {['Dom', 'Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab'].map(d => (
                                                <div key={d} className="text-center py-3 text-[10px] font-black text-slate-300 uppercase">{d}</div>
                                            ))}
                                            {Array.from({ length: 31 }, (_, i) => i + 1).map(day => {
                                                const dayProjects = projects.filter(p => new Date(p.date).getUTCDate() === day);
                                                return (
                                                    <div key={day} className={`min-h-[100px] p-3 rounded-2xl border transition-all ${dayProjects.length > 0 ? 'bg-amber-50 border-amber-200' : 'border-slate-50'}`}>
                                                        <span className="text-xs font-black text-slate-300">{day}</span>
                                                        <div className="mt-2 space-y-1">
                                                            {dayProjects.map(p => (
                                                                <div key={p.id} className="text-[8px] font-black bg-white p-1 rounded border border-amber-100 truncate">{p.client}</div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {projectTab === 'excel' && currentProject && (
                                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 animate-section">
                                        <button onClick={() => setProjectTab('list')} className="text-slate-400 flex items-center gap-2 text-xs font-black uppercase mb-6"><Icon name="arrow-left" size={14} /> Volver</button>
                                        <h3 className="text-4xl font-black mb-8">{currentProject.client} - Desglose</h3>
                                        
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-900 text-white text-[10px] font-black uppercase">
                                                <tr>
                                                    <th className="px-8 py-5">Descripción</th>
                                                    <th className="px-8 py-5 text-center">Cant.</th>
                                                    <th className="px-8 py-5 text-right">Costo U.</th>
                                                    <th className="px-8 py-5 text-right">Total</th>
                                                    <th className="px-8 py-5"></th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {(currentProject.breakdown || []).map(row => (
                                                    <tr key={row.id}>
                                                        <td className="px-8 py-4"><input value={row.desc} onChange={(e) => updateExcelRow(row.id, 'desc', e.target.value)} className="w-full bg-transparent font-bold text-slate-700 outline-none" /></td>
                                                        <td className="px-8 py-4 text-center"><input type="number" value={row.qty} onChange={(e) => updateExcelRow(row.id, 'qty', Number(e.target.value))} className="w-16 bg-transparent text-center font-bold" /></td>
                                                        <td className="px-8 py-4 text-right">$<input type="number" value={row.cost} onChange={(e) => updateExcelRow(row.id, 'cost', Number(e.target.value))} className="w-24 bg-transparent text-right outline-none inline" /></td>
                                                        <td className="px-8 py-4 text-right font-black">${(row.qty * row.cost).toLocaleString()}</td>
                                                        <td className="px-8 py-4 text-center"><button onClick={() => removeExcelRow(row.id)} className="text-rose-300"><Icon name="x-circle" size={18} /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                            <tfoot className="bg-slate-50 font-black">
                                                <tr>
                                                    <td colSpan="3" className="px-8 py-6">COSTO TOTAL</td>
                                                    <td className="px-8 py-6 text-right text-xl">${(currentProject.breakdown || []).reduce((a,c) => a + (c.qty*c.cost), 0).toLocaleString()}</td>
                                                    <td className="px-8 py-6 text-center"><button onClick={addExcelRow} className="bg-amber-500 text-white p-2 rounded-xl shadow-lg"><Icon name="plus" size={18} /></button></td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 3. EQUIPO / PERSONAL */}
                        {activeTab === 'staff' && (
                            <div className="animate-section">
                                {!selectedStaffId ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                        <div className="bg-white p-10 rounded-[2.5rem] border border-dashed flex flex-col items-center justify-center text-slate-300 cursor-pointer" onClick={async () => {
                                            const n = prompt("Nombre:"); if(n) await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'staff'), { name: n, role: 'Técnico', unavailableDates: [] });
                                        }}>
                                            <Icon name="user-plus" size={48} className="mb-4" />
                                            <p className="font-black text-xs uppercase tracking-widest text-center">Registrar Técnico</p>
                                        </div>
                                        {staff.map(s => (
                                            <div key={s.id} onClick={() => setSelectedStaffId(s.id)} className="bg-white p-8 rounded-[2.5rem] border relative group hover:shadow-2xl transition-all cursor-pointer">
                                                <div className="flex flex-col items-center">
                                                    <div className="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-[1.8rem] flex items-center justify-center font-black text-3xl mb-6">{s.name?.charAt(0)}</div>
                                                    <h4 className="font-black text-xl text-slate-800">{s.name}</h4>
                                                    <p className="text-[10px] font-black text-slate-300 uppercase mt-2 mb-4">{s.role}</p>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); deleteItem('staff', s.id); }} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-200 hover:text-rose-500 p-2 bg-white rounded-xl shadow-sm"><Icon name="trash-2" size={16} /></button>
                                            </div>
                                        ))}
                                    </div>
                                ) : currentStaff && (
                                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border animate-section">
                                        <button onClick={() => setSelectedStaffId(null)} className="text-slate-400 flex items-center gap-2 text-xs font-black uppercase mb-8"><Icon name="arrow-left" size={14} /> Volver</button>
                                        <div className="flex justify-between items-start mb-10">
                                            <h3 className="text-4xl font-black">{currentStaff.name}</h3>
                                            <button onClick={handleBlockDate} className="bg-rose-500 text-white px-6 py-3 rounded-2xl font-black shadow-lg">BLOQUEAR FECHA</button>
                                        </div>
                                        
                                        <div className="bg-slate-50 p-8 rounded-[2.8rem] border">
                                            <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-6">Agenda de Ocupación</h4>
                                            <div className="space-y-4">
                                                {projects.filter(p => p.team === currentStaff.name).map(p => (
                                                    <div key={p.id} className="flex items-center justify-between p-5 bg-white rounded-2xl shadow-sm">
                                                        <span className="font-black">{p.client} - {p.service}</span>
                                                        <span className="text-[10px] font-black bg-blue-100 text-blue-700 px-3 py-1 rounded-full">{p.date}</span>
                                                    </div>
                                                ))}
                                                {(currentStaff.unavailableDates || []).map((date, idx) => (
                                                    <div key={idx} className="flex items-center justify-between p-5 bg-rose-50 rounded-2xl border border-rose-100">
                                                        <span className="font-black text-rose-800">FECHA BLOQUEADA</span>
                                                        <div className="flex items-center gap-4">
                                                            <span className="text-[10px] font-black bg-rose-200 text-rose-800 px-3 py-1 rounded-full">{date}</span>
                                                            <button onClick={() => removeUnavailableDate(date)} className="text-rose-400"><Icon name="trash-2" size={16}/></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 4. INVENTARIO */}
                        {activeTab === 'inventory' && (
                            <div className="animate-section">
                                <Hero title="Almacén" subtitle="Control de insumos críticos." icon="package" color="bg-gradient-to-br from-slate-700 to-slate-900" />
                                <div className="bg-white p-10 rounded-[2.5rem] border shadow-sm mb-10">
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), { name: fd.get('name'), stock: Number(fd.get('stock')), price: Number(fd.get('price')) });
                                        e.target.reset();
                                    }} className="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                                        <input name="name" required className="p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Nombre Material" />
                                        <input name="stock" type="number" required className="p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Stock" />
                                        <input name="price" type="number" step="0.01" required className="p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Costo Unit." />
                                        <button type="submit" className="py-4 bg-slate-800 text-white font-black rounded-2xl">AÑADIR</button>
                                    </form>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-10 rounded-[2.5rem] border relative group h-[250px] flex flex-col justify-between">
                                            <h4 className="font-black text-2xl truncate">{item.name}</h4>
                                            <p className="text-5xl font-black text-slate-800 tracking-tighter">{item.stock} <span className="text-xs text-slate-400 font-bold uppercase">UDS</span></p>
                                            <button onClick={() => deleteItem('inventory', item.id)} className="absolute bottom-10 right-10 text-slate-200 hover:text-rose-500 transition-all"><Icon name="trash-2" size={20} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 5. FINANZAS */}
                        {activeTab === 'finances' && (
                            <div className="animate-section">
                                <Hero title="Finanzas" subtitle="Control de ingresos y egresos." icon="dollar-sign" color="bg-gradient-to-br from-emerald-500 to-teal-800" />
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border">
                                            <form onSubmit={async (e) => {
                                                e.preventDefault();
                                                const fd = new FormData(e.target);
                                                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'finances'), { description: fd.get('description'), amount: Number(fd.get('amount')), type: fd.get('type'), date: new Date().toISOString().split('T')[0] });
                                                e.target.reset();
                                            }} className="space-y-4">
                                                <input name="description" required className="p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Concepto" />
                                                <input name="amount" type="number" step="0.01" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-emerald-600 text-lg" placeholder="Monto $" />
                                                <select name="type" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                                                    <option value="income">Ingreso (+)</option>
                                                    <option value="expense">Gasto (-)</option>
                                                </select>
                                                <button type="submit" className="w-full py-5 bg-emerald-600 text-white font-black rounded-2xl shadow-xl transition-all active:scale-95">GUARDAR</button>
                                            </form>
                                        </div>
                                        <div className="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl relative overflow-hidden text-center">
                                            <p className="text-emerald-400 font-black text-[10px] uppercase tracking-widest mb-2">Utilidad Acumulada</p>
                                            <h2 className="text-5xl font-black">${stats.balance.toLocaleString()}</h2>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-8 bg-white rounded-[3rem] border shadow-sm overflow-hidden">
                                        <div className="max-h-[600px] overflow-y-auto divide-y">
                                            {finances.sort((a,b) => b.id > a.id ? 1 : -1).map(f => (
                                                <div key={f.id} className="flex items-center justify-between p-8 hover:bg-slate-50/50 group">
                                                    <div className="flex items-center gap-6">
                                                        <div className={`p-4 rounded-2xl ${f.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                            <Icon name={f.type === 'income' ? 'arrow-up-right' : 'arrow-down-right'} />
                                                        </div>
                                                        <span className="font-black text-xl">{f.description}</span>
                                                    </div>
                                                    <div className="flex items-center gap-8">
                                                        <span className={`text-2xl font-black ${f.type === 'income' ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                            {f.type === 'income' ? '+' : '-'}${f.amount?.toLocaleString()}
                                                        </span>
                                                        <button onClick={() => deleteItem('finances', f.id)} className="text-slate-200 hover:text-rose-500"><Icon name="trash-2" size={20} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
