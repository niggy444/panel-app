<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Shave - Control Financiero & Reservas</title>
  
  <!-- Tailwind CSS CDN para Estilizado Premium -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: {
              850: '#1b2330',
              950: '#030712',
            }
          }
        }
      }
    }
  </script>

  <!-- CDNs Oficiales de React 18 y ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- CDN de Babel Standalone para transpilar JSX en tiempo de ejecución -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <!-- Contenedor raíz donde React renderizará la App -->
  <div id="root"></div>

  <!-- Script con sintaxis JSX transpilado por Babel -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- MOCK DATA INICIAL ---
    const INITIAL_SERVICES = [
      { id: 's1', name: 'Corte de Cabello Clásico', price: 250, cost: 50 },
      { id: 's2', name: 'Arreglo de Barba Premium', price: 180, cost: 30 },
      { id: 's3', name: 'Corte + Barba (Combo)', price: 380, cost: 70 },
      { id: 's4', name: 'Coloración / Tintura', price: 500, cost: 120 },
    ];

    const INITIAL_PRODUCTS = [
      { id: 'p1', name: 'Cera Moldeadora Mate', price: 220, cost: 100, stock: 6 },
      { id: 'p2', name: 'Aceite de Barba de Eucalipto', price: 190, cost: 80, stock: 2 }, // Alerta de stock bajo <= 2
      { id: 'p3', name: 'Champú Anticaspa Profesional', price: 280, cost: 120, stock: 1 }, // Alerta de stock bajo <= 2
      { id: 'p4', name: 'Aftershave Bálsamo Suave', price: 150, cost: 60, stock: 12 },
    ];

    const INITIAL_BARBERS = [
      { id: 'b1', name: 'Carlos Gómez', avatar: '✂️', active: true },
      { id: 'b2', name: 'Mateo Rodríguez', avatar: '💈', active: true },
      { id: 'b3', name: 'Santiago "Razor" Silva', avatar: '🧔', active: true },
    ];

    const INITIAL_TRANSACTIONS = [
      { id: 't1', type: 'ingreso', category: 'servicio', itemId: 's1', itemName: 'Corte de Cabello Clásico', amount: 250, date: '2026-05-10', barberId: 'b1' },
      { id: 't2', type: 'ingreso', category: 'servicio', itemId: 's3', itemName: 'Corte + Barba (Combo)', amount: 380, date: '2026-05-12', barberId: 'b2' },
      { id: 't3', type: 'ingreso', category: 'producto', itemId: 'p1', itemName: 'Cera Moldeadora Mate', amount: 220, date: '2026-05-14', barberId: null },
      { id: 't4', type: 'gasto', category: 'operativo', itemName: 'Renta del Local', amount: 3000, date: '2026-05-01', barberId: null },
      { id: 't5', type: 'gasto', category: 'operativo', itemName: 'Insumos de Barbería (Toallas, etc)', amount: 450, date: '2026-05-05', barberId: null },
      { id: 't6', type: 'ingreso', category: 'servicio', itemId: 's4', itemName: 'Coloración / Tintura', amount: 500, date: '2026-05-20', barberId: 'b3' },
      { id: 't7', type: 'ingreso', category: 'producto', itemId: 'p4', itemName: 'Aftershave Bálsamo Suave', amount: 150, date: '2026-05-22', barberId: null },
      { id: 't8', type: 'ingreso', category: 'servicio', itemId: 's2', itemName: 'Arreglo de Barba Premium', amount: 180, date: '2026-05-24', barberId: 'b1' },
    ];

    const INITIAL_APPOINTMENTS = [
      { id: 'a1', clientName: 'Juan Pérez', phone: '555-0192', barberId: 'b1', serviceId: 's1', date: '2026-05-26', time: '10:00', status: 'pendiente' },
      { id: 'a2', clientName: 'Andrés López', phone: '555-0343', barberId: 'b2', serviceId: 's3', date: '2026-05-26', time: '11:30', status: 'pendiente' },
      { id: 'a3', clientName: 'Diego Torres', phone: '555-0988', barberId: 'b3', serviceId: 's2', date: '2026-05-27', time: '14:00', status: 'pendiente' },
    ];

    function App() {
      // --- ESTADOS DE LA APLICACIÓN ---
      const [currentTab, setCurrentTab] = useState('dashboard');
      const [services, setServices] = useState(INITIAL_SERVICES);
      const [products, setProducts] = useState(INITIAL_PRODUCTS);
      const [barbers, setBarbers] = useState(INITIAL_BARBERS);
      const [transactions, setTransactions] = useState(INITIAL_TRANSACTIONS);
      const [appointments, setAppointments] = useState(INITIAL_APPOINTMENTS);

      // --- ESTADOS DE FORMULARIOS ---
      const [txType, setTxType] = useState('ingreso');
      const [txCategory, setTxCategory] = useState('servicio');
      const [selectedItemId, setSelectedItemId] = useState('');
      const [txAmount, setTxAmount] = useState('');
      const [txItemName, setTxItemName] = useState('');
      const [txDate, setTxDate] = useState(new Date().toISOString().split('T')[0]);
      const [txBarberId, setTxBarberId] = useState('');

      // Edición Costo / Inventario
      const [editingItemType, setEditingItemType] = useState('servicio');
      const [editingItemId, setEditingItemId] = useState('');
      const [editPrice, setEditPrice] = useState('');
      const [editCost, setEditCost] = useState('');
      const [newStock, setNewStock] = useState('');

      // Agenda Admin
      const [adminClientName, setAdminClientName] = useState('');
      const [adminPhone, setAdminPhone] = useState('');
      const [adminBarber, setAdminBarber] = useState('');
      const [adminService, setAdminService] = useState('');
      const [adminDate, setAdminDate] = useState(new Date().toISOString().split('T')[0]);
      const [adminTime, setAdminTime] = useState('09:00');

      // Reservas Clientes
      const [clientStep, setClientStep] = useState(1);
      const [clientMode, setClientMode] = useState('');
      const [clientBarber, setClientBarber] = useState('');
      const [clientService, setClientService] = useState('');
      const [clientDate, setClientDate] = useState('');
      const [clientTime, setClientTime] = useState('');
      const [clientName, setClientName] = useState('');
      const [clientPhone, setClientPhone] = useState('');

      const [projectionGrowth, setProjectionGrowth] = useState(10);
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => {
          setNotification(null);
        }, 5000);
      };

      // --- ACCIONES ---
      const handleTxCategoryChange = (cat) => {
        setTxCategory(cat);
        if (cat === 'servicio') {
          const firstSrv = services[0];
          if (firstSrv) {
            setSelectedItemId(firstSrv.id);
            setTxAmount(firstSrv.price);
            setTxItemName(firstSrv.name);
          }
        } else if (cat === 'producto') {
          const firstProd = products[0];
          if (firstProd) {
            setSelectedItemId(firstProd.id);
            setTxAmount(firstProd.price);
            setTxItemName(firstProd.name);
          }
        } else {
          setSelectedItemId('');
          setTxAmount('');
          setTxItemName('');
        }
      };

      const handleItemSelectChange = (id) => {
        setSelectedItemId(id);
        if (txCategory === 'servicio') {
          const srv = services.find(s => s.id === id);
          if (srv) {
            setTxAmount(srv.price);
            setTxItemName(srv.name);
          }
        } else if (txCategory === 'producto') {
          const prod = products.find(p => p.id === id);
          if (prod) {
            setTxAmount(prod.price);
            setTxItemName(prod.name);
          }
        }
      };

      const handleAddTransaction = (e) => {
        e.preventDefault();
        let finalAmount = parseFloat(txAmount);
        let finalItemName = txItemName;

        if (txType === 'gasto' && txCategory === 'operativo') {
          if (!finalItemName || isNaN(finalAmount)) {
            showNotification('Completa todos los campos del gasto.', 'error');
            return;
          }
        } else {
          if (!selectedItemId || isNaN(finalAmount)) {
            showNotification('Selecciona un elemento válido.', 'error');
            return;
          }
        }

        if (txType === 'ingreso' && txCategory === 'producto') {
          try {
            const updatedProducts = products.map(prod => {
              if (prod.id === selectedItemId) {
                if (prod.stock < 1) {
                  showNotification(`¡Sin stock! "${prod.name}" no está disponible.`, 'error');
                  throw new Error('Sin stock');
                }
                const nextStock = prod.stock - 1;
                if (nextStock <= 2) {
                  showNotification(`⚠️ STOCK BAJO: "${prod.name}" tiene solo ${nextStock} pz en almacén.`, 'warning');
                }
                return { ...prod, stock: nextStock };
              }
              return prod;
            });
            setProducts(updatedProducts);
          } catch (e) {
            return;
          }
        }

        const newTx = {
          id: 't_' + Date.now(),
          type: txType,
          category: txCategory,
          itemId: selectedItemId || null,
          itemName: finalItemName,
          amount: finalAmount,
          date: txDate,
          barberId: txCategory === 'servicio' ? txBarberId : null
        };

        setTransactions([newTx, ...transactions]);
        showNotification('Registro financiero agregado correctamente.');
        setTxAmount('');
        setSelectedItemId('');
        setTxItemName('');
      };

      const handleSaveItemEdit = (e) => {
        e.preventDefault();
        const price = parseFloat(editPrice);
        const cost = parseFloat(editCost);

        if (isNaN(price) || isNaN(cost)) {
          showNotification('Los montos deben ser válidos.', 'error');
          return;
        }

        if (editingItemType === 'servicio') {
          setServices(services.map(s => {
            if (s.id === editingItemId) return { ...s, price, cost };
            return s;
          }));
          showNotification('Servicio actualizado.');
        } else {
          const stockVal = parseInt(newStock);
          if (isNaN(stockVal)) {
            showNotification('Stock inválido.', 'error');
            return;
          }
          setProducts(products.map(p => {
            if (p.id === editingItemId) return { ...p, price, cost, stock: stockVal };
            return p;
          }));
          showNotification('Producto actualizado.');
        }
        setEditingItemId('');
        setEditPrice('');
        setEditCost('');
        setNewStock('');
      };

      const startEditing = (type, item) => {
        setEditingItemType(type);
        setEditingItemId(item.id);
        setEditPrice(item.price);
        setEditCost(item.cost);
        if (type === 'producto') {
          setNewStock(item.stock);
        }
      };

      const handleAdminAddAppointment = (e) => {
        e.preventDefault();
        if (!adminClientName || !adminBarber || !adminService || !adminPhone) {
          showNotification('Completa todos los campos.', 'error');
          return;
        }

        const newAppoint = {
          id: 'a_' + Date.now(),
          clientName: adminClientName,
          phone: adminPhone,
          barberId: adminBarber,
          serviceId: adminService,
          date: adminDate,
          time: adminTime,
          status: 'pendiente'
        };

        setAppointments([...appointments, newAppoint]);
        showNotification(`Cita de ${adminClientName} agendada correctamente.`);
        setAdminClientName('');
        setAdminPhone('');
        setAdminBarber('');
        setAdminService('');
      };

      const handleCompleteAppointment = (id) => {
        const app = appointments.find(a => a.id === id);
        if (!app) return;

        const service = services.find(s => s.id === app.serviceId);
        if (!service) return;

        const newTx = {
          id: 't_' + Date.now(),
          type: 'ingreso',
          category: 'servicio',
          itemId: service.id,
          itemName: service.name,
          amount: service.price,
          date: app.date,
          barberId: app.barberId
        };

        setTransactions([newTx, ...transactions]);
        setAppointments(appointments.map(a => {
          if (a.id === id) return { ...a, status: 'completada' };
          return a;
        }));

        showNotification(`¡Cita completada! Ingreso registrado. 40% de comisión asignada al barbero.`);
      };

      const handleCancelAppointment = (id) => {
        setAppointments(appointments.map(a => {
          if (a.id === id) return { ...a, status: 'cancelada' };
          return a;
        }));
        showNotification('Cita cancelada.', 'info');
      };

      const handleClientBooking = (e) => {
        e.preventDefault();
        if (clientStep === 1) {
          if (!clientService || !clientDate || !clientTime) {
            showNotification('Completa servicio, fecha y hora.', 'error');
            return;
          }
          if (clientMode === 'barber' && !clientBarber) {
            showNotification('Selecciona un barbero favorito.', 'error');
            return;
          }
          setClientStep(2);
        } else if (clientStep === 2) {
          if (!clientName || !clientPhone) {
            showNotification('Escribe tu nombre y celular.', 'error');
            return;
          }

          let finalBarberId = clientBarber;
          if (clientMode === 'general') {
            const randomIndex = Math.floor(Math.random() * barbers.length);
            finalBarberId = barbers[randomIndex]?.id || 'b1';
          }

          const newAppoint = {
            id: 'a_' + Date.now(),
            clientName,
            phone: clientPhone,
            barberId: finalBarberId,
            serviceId: clientService,
            date: clientDate,
            time: clientTime,
            status: 'pendiente'
          };

          setAppointments([...appointments, newAppoint]);
          setClientStep(3);
        }
      };

      const resetClientBookingForm = () => {
        setClientStep(1);
        setClientMode('');
        setClientBarber('');
        setClientService('');
        setClientDate('');
        setClientTime('');
        setClientName('');
        setClientPhone('');
      };

      // --- CÁLCULOS MEMOIZADOS ---
      const lowStockAlerts = useMemo(() => products.filter(p => p.stock <= 2), [products]);

      const financialTotals = useMemo(() => {
        let totalRevenue = 0;
        let totalCost = 0;
        let totalBarberCommissions = 0;

        transactions.forEach(tx => {
          if (tx.type === 'ingreso') {
            totalRevenue += tx.amount;
            if (tx.category === 'servicio') {
              const srv = services.find(s => s.id === tx.itemId);
              if (srv) totalCost += srv.cost;
              totalBarberCommissions += tx.amount * 0.40;
            } else if (tx.category === 'producto') {
              const prod = products.find(p => p.id === tx.itemId);
              if (prod) totalCost += prod.cost;
            }
          } else if (tx.type === 'gasto') {
            totalCost += tx.amount;
          }
        });

        const netUtility = totalRevenue - totalCost - totalBarberCommissions;
        const margin = totalRevenue > 0 ? (netUtility / totalRevenue) * 100 : 0;

        return {
          totalRevenue,
          totalCost: totalCost + totalBarberCommissions,
          totalBarberCommissions,
          netUtility,
          profitMargin: margin.toFixed(1)
        };
      }, [transactions, services, products]);

      const itemDemands = useMemo(() => {
        const srvCounts = {};
        const prodCounts = {};

        transactions.forEach(tx => {
          if (tx.type === 'ingreso') {
            if (tx.category === 'servicio') {
              srvCounts[tx.itemName] = (srvCounts[tx.itemName] || 0) + tx.amount;
            } else if (tx.category === 'producto') {
              prodCounts[tx.itemName] = (prodCounts[tx.itemName] || 0) + tx.amount;
            }
          }
        });

        return {
          services: Object.entries(srvCounts).map(([name, val]) => ({ name, value: val })).sort((a,b) => b.value - a.value),
          products: Object.entries(prodCounts).map(([name, val]) => ({ name, value: val })).sort((a,b) => b.value - a.value),
        };
      }, [transactions]);

      const barberMetrics = useMemo(() => {
        const todayStr = new Date().toISOString().split('T')[0];
        const isThisWeek = (dateStr) => {
          const date = new Date(dateStr);
          const today = new Date();
          return Math.ceil(Math.abs(today - date) / (1000 * 60 * 60 * 24)) <= 7;
        };

        const currentMonth = new Date().getMonth();
        const currentYear = new Date().getFullYear();

        return barbers.map(barber => {
          const barberTxs = transactions.filter(tx => tx.barberId === barber.id && tx.category === 'servicio');
          let commissionToday = 0, commissionWeek = 0, commissionMonth = 0, commissionYear = 0;
          let totalCuts = barberTxs.length;

          barberTxs.forEach(tx => {
            const comm = tx.amount * 0.40;
            if (tx.date === todayStr) commissionToday += comm;
            if (isThisWeek(tx.date)) commissionWeek += comm;
            const txDateObj = new Date(tx.date);
            if (txDateObj.getMonth() === currentMonth && txDateObj.getFullYear() === currentYear) commissionMonth += comm;
            if (txDateObj.getFullYear() === currentYear) commissionYear += comm;
          });

          return {
            ...barber,
            totalCuts,
            commissionToday,
            commissionWeek,
            commissionMonth,
            commissionYear
          };
        });
      }, [transactions, barbers]);

      const projections = useMemo(() => {
        const rev = financialTotals.totalRevenue;
        const growthFactor = 1 + (projectionGrowth / 100);
        const projectedRevenue = rev * growthFactor;
        const marginRatio = financialTotals.totalRevenue > 0 ? (financialTotals.netUtility / financialTotals.totalRevenue) : 0.40;
        const projectedUtility = projectedRevenue * marginRatio;

        return {
          projectedRevenue: projectedRevenue.toFixed(2),
          projectedUtility: projectedUtility.toFixed(2),
          increaseValue: (projectedRevenue - rev).toFixed(2)
        };
      }, [financialTotals, projectionGrowth]);

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans">
          
          {/* CABECERA */}
          <header className="bg-slate-900 border-b border-amber-500/20 px-4 py-3 flex justify-between items-center sticky top-0 z-40">
            <div className="flex items-center space-x-3">
              <span className="text-3xl">💈</span>
              <div>
                <h1 className="text-lg font-bold text-amber-500 tracking-wider">ELITE SHAVE</h1>
                <p className="text-xs text-slate-400">Control Financiero & Reservas</p>
              </div>
            </div>

            <button
              onClick={() => { setCurrentTab('cliente-booking'); resetClientBookingForm(); }}
              className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-3 py-1.5 rounded-lg text-xs flex items-center transition-colors"
            >
              <span className="mr-1">🌐</span> Vista de Clientes (Link)
            </button>
          </header>

          {/* ALERTAS */}
          {notification && (
            <div className={`p-4 text-center font-semibold text-sm ${
              notification.type === 'error' ? 'bg-red-900 text-red-100' :
              notification.type === 'warning' ? 'bg-amber-600 text-slate-950' : 'bg-emerald-800 text-emerald-100'
            } transition-all duration-300`}>
              {notification.message}
            </div>
          )}

          {lowStockAlerts.length > 0 && currentTab !== 'cliente-booking' && (
            <div className="bg-red-950 border-y border-red-500/30 px-4 py-2 flex items-center justify-between">
              <div className="flex items-center space-x-2 text-red-400 text-xs sm:text-sm">
                <span>🚨</span>
                <strong className="font-bold">¡Stock Crítico!</strong>
                <span>Productos con 2 o menos unidades:</span>
                <div className="flex flex-wrap gap-1.5 ml-2">
                  {lowStockAlerts.map(p => (
                    <span key={p.id} className="bg-red-900 text-red-100 px-2 py-0.5 rounded text-xs font-mono font-bold">
                      {p.name} ({p.stock} pz)
                    </span>
                  ))}
                </div>
              </div>
              <button
                onClick={() => setCurrentTab('inventario')}
                className="text-xs bg-red-800 hover:bg-red-700 text-white px-2 py-1 rounded transition-colors"
              >
                Surtir
              </button>
            </div>
          )}

          {/* CONTENIDO PRINCIPAL */}
          <div className="flex-1 flex flex-col md:flex-row">
            
            {/* LATERAL MENU (ADMIN) */}
            {currentTab !== 'cliente-booking' && (
              <aside className="w-full md:w-64 bg-slate-900/50 border-r border-slate-800/80 p-4 space-y-2 flex flex-row md:flex-col overflow-x-auto md:overflow-y-auto">
                <div className="hidden md:block text-xs font-semibold text-slate-500 tracking-wider uppercase mb-3">
                  Administración
                </div>
                
                <button
                  onClick={() => setCurrentTab('dashboard')}
                  className={`w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center space-x-3 transition-all shrink-0 ${
                    currentTab === 'dashboard' ? 'bg-amber-500/10 text-amber-500 font-semibold border-l-2 border-amber-500' : 'hover:bg-slate-800/50 text-slate-400'
                  }`}
                >
                  <span>📊</span>
                  <span>Dashboard General</span>
                </button>

                <button
                  onClick={() => setCurrentTab('citas')}
                  className={`w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center space-x-3 transition-all shrink-0 ${
                    currentTab === 'citas' ? 'bg-amber-500/10 text-amber-500 font-semibold border-l-2 border-amber-500' : 'hover:bg-slate-800/50 text-slate-400'
                  }`}
                >
                  <span>📅</span>
                  <span>Agenda & Citas</span>
                </button>

                <button
                  onClick={() => setCurrentTab('finanzas')}
                  className={`w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center space-x-3 transition-all shrink-0 ${
                    currentTab === 'finanzas' ? 'bg-amber-500/10 text-amber-500 font-semibold border-l-2 border-amber-500' : 'hover:bg-slate-800/50 text-slate-400'
                  }`}
                >
                  <span>💵</span>
                  <span>Ingresos y Gastos</span>
                </button>

                <button
                  onClick={() => setCurrentTab('inventario')}
                  className={`w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center space-x-3 transition-all shrink-0 ${
                    currentTab === 'inventario' ? 'bg-amber-500/10 text-amber-500 font-semibold border-l-2 border-amber-500' : 'hover:bg-slate-800/50 text-slate-400'
                  }`}
                >
                  <span>📦</span>
                  <span>Precios & Utilidad</span>
                </button>

                <button
                  onClick={() => setCurrentTab('barberos')}
                  className={`w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center space-x-3 transition-all shrink-0 ${
                    currentTab === 'barberos' ? 'bg-amber-500/10 text-amber-500 font-semibold border-l-2 border-amber-500' : 'hover:bg-slate-800/50 text-slate-400'
                  }`}
                >
                  <span>💈</span>
                  <span>Comisiones Barberos</span>
                </button>
              </aside>
            )}

            {/* SECCIÓN VISTA ACTIVA */}
            <main className="flex-1 p-4 md:p-6 overflow-y-auto max-w-7xl mx-auto w-full">
              
              {/* TAB: DASHBOARD */}
              {currentTab === 'dashboard' && (
                <div className="space-y-6">
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col justify-between">
                      <div className="flex justify-between items-center text-slate-400 text-xs">
                        <span>INGRESOS BRUTOS</span>

                        {editingItemType === 'producto' && (
                          <div>
                            <label className="block text-xs text-slate-400 mb-1">Stock de Almacén</label>
                            <input
                              type="number"
                              value={newStock}
                              onChange={(e) => setNewStock(e.target.value)}
                              className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-1.5 text-xs text-indigo-400 font-bold"
                              required
                            />
                          </div>
                        )}
                        <div className="flex items-end">
                          <button type="submit" className="w-full bg-amber-500 text-slate-950 font-bold py-2 rounded text-xs">Guardar Tarifa</button>
                        </div>
                      </form>
                    </div>
                  )}

                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-5">
                    <h3 className="text-sm font-bold text-amber-500 mb-4 uppercase">Costo y Margen de Utilidad (Servicios)</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs border-collapse">
                        <thead>
                          <tr className="border-b border-slate-800 text-slate-400">
                            <th className="py-2">Servicio</th>
                            <th>P. Público</th>
                            <th>Insumos</th>
                            <th>Pago Barbero (40%)</th>
                            <th>Utilidad Neta (60% - Costos)</th>
                            <th>Ajustes</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-800/60">
                          {services.map(s => {
                            const barberComm = s.price * 0.40;
                            const netUtility = s.price - s.cost - barberComm;
                            return (
                              <tr key={s.id} className="hover:bg-slate-950/15">
                                <td className="py-3 font-semibold text-slate-200">{s.name}</td>
                                <td className="font-mono text-slate-300">${s.price}</td>
                                <td className="font-mono text-red-400">${s.cost}</td>
                                <td className="font-mono text-indigo-400">${barberComm.toFixed(2)}</td>
                                <td className="font-mono text-emerald-400 font-bold">${netUtility.toFixed(2)}</td>
                                <td>
                                  <button onClick={() => startEditing('servicio', s)} className="text-[11px] text-amber-500 hover:underline">Configurar</button>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-5">
                    <h3 className="text-sm font-bold text-amber-500 mb-4 uppercase">Inventario y Utilidades (Productos)</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs border-collapse">
                        <thead>
                          <tr className="border-b border-slate-800 text-slate-400">
                            <th className="py-2">Producto</th>
                            <th>Stock</th>
                            <th>P. Público</th>
                            <th>Costo Adquisición</th>
                            <th>Utilidad Bruta</th>
                            <th>Estatus</th>
                            <th>Ajustes</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-800/60">
                          {products.map(p => {
                            const utility = p.price - p.cost;
                            return (
                              <tr key={p.id} className="hover:bg-slate-950/15">
                                <td className="py-3 font-semibold text-slate-200">{p.name}</td>
                                <td className="font-mono text-slate-200 font-bold">{p.stock} pz</td>
                                <td className="font-mono text-slate-300">${p.price}</td>
                                <td className="font-mono text-red-400">${p.cost}</td>
                                <td className="font-mono text-emerald-400 font-bold">${utility}</td>
                                <td>
                                  {p.stock <= 2 ? (
                                    <span className="bg-red-500/10 text-red-400 border border-red-500/20 px-2 py-0.5 rounded text-[10px] font-bold">STOCK BAJO</span>
                                  ) : (
                                    <span className="bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-bold">ESTABLE</span>
                                  )}
                                </td>
                                <td>
                                  <button onClick={() => startEditing('producto', p)} className="text-[11px] text-amber-500 hover:underline">Configurar</button>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB: BARBEROS */}
              {currentTab === 'barberos' && (
                <div className="space-y-6">
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-5">
                    <div className="border-b border-slate-800 pb-3 mb-4">
                      <h3 className="text-sm font-semibold text-amber-500 tracking-wide uppercase font-bold">Rendimiento de Barberos (Esquema 60/40)</h3>
                      <p className="text-xs text-slate-400">Corte/Servicio: 40% de comisión para el Barbero y 60% retenido por la Barbería.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      {barberMetrics.map(barber => (
                        <div key={barber.id} className="bg-slate-950 border border-slate-850 rounded-xl p-5 space-y-4">
                          <div className="flex items-center space-x-3">
                            <span className="text-3xl bg-slate-900 p-2 rounded-lg">{barber.avatar}</span>
                            <div>
                              <h4 className="font-bold text-slate-100">{barber.name}</h4>
                              <span className="text-[10px] bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded-full font-bold">Activo</span>
                            </div>
                          </div>

                          <div className="bg-slate-900/50 p-3 rounded-lg flex justify-between items-center text-xs">
                            <span className="text-slate-400">Servicios realizados:</span>
                            <span className="font-bold text-slate-100 font-mono">{barber.totalCuts}</span>
                          </div>

                          <div className="space-y-2">
                            <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider block">Historial Comisiones (40%):</span>
                            <div className="grid grid-cols-2 gap-2 text-xs">
                              <div className="bg-slate-900/30 p-2 rounded">
                                <span className="block text-[10px] text-slate-400">Hoy</span>
                                <span className="font-bold text-emerald-400 font-mono">${barber.commissionToday}</span>
                              </div>
                              <div className="bg-slate-900/30 p-2 rounded">
                                <span className="block text-[10px] text-slate-400">Semana</span>
                                <span className="font-bold text-emerald-400 font-mono">${barber.commissionWeek}</span>
                              </div>
                              <div className="bg-slate-900/30 p-2 rounded">
                                <span className="block text-[10px] text-slate-400">Mes</span>
                                <span className="font-bold text-emerald-400 font-mono">${barber.commissionMonth}</span>
                              </div>
                              <div className="bg-slate-900/30 p-2 rounded">
                                <span className="block text-[10px] text-slate-400">Año</span>
                                <span className="font-bold text-emerald-400 font-mono">${barber.commissionYear}</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* TAB: RESERVAS CLIENTES */}
              {currentTab === 'cliente-booking' && (
                <div className="max-w-2xl mx-auto space-y-6">
                  <div className="text-center space-y-2">
                    <span className="text-5xl">💈</span>
                    <h2 className="text-3xl font-extrabold text-amber-500 tracking-wider">ELITE SHAVE BARBERÍA</h2>
                    <p className="text-xs text-slate-400">Agenda tu cita de manera automatizada</p>
                  </div>

                  {clientStep === 1 && (
                    <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-6 shadow-2xl">
                      <h3 className="text-md font-bold text-slate-100 text-center pb-2 border-b border-slate-800">PROGRAMA TU CITA</h3>
                      
                      <form onSubmit={handleClientBooking} className="space-y-4">
                        <div>
                          <label className="block text-xs font-bold text-slate-400 uppercase mb-2">¿Cómo deseas agendar?</label>
                          <div className="grid grid-cols-2 gap-3">
                            <button
                              type="button"
                              onClick={() => { setClientMode('barber'); setClientBarber(barbers[0]?.id || ''); }}
                              className={`p-3 rounded-xl border text-center transition-all ${
                                clientMode === 'barber' ? 'bg-amber-500/10 border-amber-500 text-amber-500 font-bold' : 'bg-slate-950 border-slate-850 text-slate-400'
                              }`}
                            >
                              <span className="block text-lg">🧔</span>
                              <span className="text-xs">Por Barbero Favorito</span>
                            </button>
                            <button
                              type="button"
                              onClick={() => { setClientMode('general'); setClientBarber(''); }}
                              className={`p-3 rounded-xl border text-center transition-all ${
                                clientMode === 'general' ? 'bg-amber-500/10 border-amber-500 text-amber-500 font-bold' : 'bg-slate-950 border-slate-850 text-slate-400'
                              }`}
                            >
                              <span className="block text-lg">📅</span>
                              <span className="text-xs">Agenda General</span>
                            </button>
                          </div>
                        </div>

                        {clientMode === 'barber' && (
                          <div>
                            <label className="block text-xs font-bold text-slate-400 mb-2 uppercase">Selecciona Profesional</label>
                            <div className="grid grid-cols-3 gap-2">
                              {barbers.map(b => (
                                <button
                                  type="button"
                                  key={b.id}
                                  onClick={() => setClientBarber(b.id)}
                                  className={`p-2 rounded-lg border text-center transition-all ${
                                    clientBarber === b.id ? 'bg-amber-500 border-amber-500 text-slate-950 font-bold' : 'bg-slate-950 border-slate-800 text-slate-300'
                                  }`}
                                >
                                  <span className="block">{b.avatar}</span>
                                  <span className="text-[10px] block truncate">{b.name}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        )}

                        <div>
                          <label className="block text-xs font-bold text-slate-400 mb-2 uppercase">Selecciona Servicio</label>
                          <select
                            value={clientService}
                            onChange={(e) => setClientService(e.target.value)}
                            className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-amber-500"
                            required
                          >
                            <option value="">Escoge un servicio...</option>
                            {services.map(s => (
                              <option key={s.id} value={s.id}>{s.name} - ${s.price}</option>
                            ))}
                          </select>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-xs text-slate-400 mb-1">Día Deseado</label>
                            <input
                              type="date"
                              value={clientDate}
                              onChange={(e) => setClientDate(e.target.value)}
                              className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300"
                              required
                            />
                          </div>
                          <div>
                            <label className="block text-xs text-slate-400 mb-1">Hora Conveniente</label>
                            <select
                              value={clientTime}
                              onChange={(e) => setClientTime(e.target.value)}
                              className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none"
                              required
                            >
                              <option value="">Selecciona hora...</option>
                              <option value="09:00">09:00 AM</option>
                              <option value="10:00">10:00 AM</option>
                              <option value="11:00">11:00 AM</option>
                              <option value="12:00">12:00 PM</option>
                              <option value="13:00">01:00 PM</option>
                              <option value="14:00">02:00 PM</option>
                              <option value="15:00">03:00 PM</option>
                            </select>
                          </div>
                        </div>

                        <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-extrabold py-3 rounded-lg text-xs tracking-wider transition-colors">
                          SIGUIENTE PASO
                        </button>
                      </form>
                    </div>
                  )}

                  {clientStep === 2 && (
                    <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-2xl">
                      <h3 className="text-md font-bold text-slate-100 text-center pb-2 border-b border-slate-800">COMPLETA TUS DATOS</h3>
                      
                      <form onSubmit={handleClientBooking} className="space-y-4">
                        <div>
                          <label className="block text-xs text-slate-400 mb-1">Nombre Completo *</label>
                          <input
                            type="text"
                            placeholder="Ej. Carlos Martínez"
                            value={clientName}
                            onChange={(e) => setClientName(e.target.value)}
                            className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none"
                            required
                          />
                        </div>

                        <div>
                          <label className="block text-xs text-slate-400 mb-1">Teléfono Celular *</label>
                          <input
                            type="tel"
                            placeholder="Ej. 555-4422"
                            value={clientPhone}
                            onChange={(e) => setClientPhone(e.target.value)}
                            className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none"
                            required
                          />
                        </div>

                        <div className="bg-slate-950 p-4 rounded-lg border border-slate-850 text-xs text-slate-300 space-y-1">
                          <h4 className="font-bold text-amber-500">Resumen:</h4>
                          <p>✂️ Servicio: <strong className="text-white">{services.find(s => s.id === clientService)?.name}</strong></p>
                          <p>📅 Horario: <strong className="text-white">{clientDate} a las {clientTime} hrs</strong></p>
                        </div>

                        <div className="grid grid-cols-2 gap-2">
                          <button type="button" onClick={() => setClientStep(1)} className="bg-slate-850 hover:bg-slate-800 text-slate-400 py-2.5 rounded-lg text-xs">Atrás</button>
                          <button type="submit" className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-2.5 rounded-lg text-xs">CONFIRMAR CITA</button>
                        </div>
                      </form>
                    </div>
                  )}

                  {clientStep === 3 && (
                    <div className="bg-slate-900 border border-slate-800 rounded-2xl p-8 text-center space-y-4 shadow-2xl">
                      <span className="text-6xl block">✅</span>
                      <h3 className="text-xl font-bold text-emerald-400">¡AGENDADO CON ÉXITO!</h3>
                      <p className="text-sm text-slate-300">Te esperamos en la sucursal de Elite Shave.</p>
                      <button onClick={() => { setCurrentTab('dashboard'); resetClientBookingForm(); }} className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-6 py-2 rounded-lg text-xs">Regresar al Panel</button>
                    </div>
                  )}
                </div>
              )}

            </main>
          </div>

          <footer className="bg-slate-900 border-t border-slate-800 py-3 text-center text-slate-500 text-[10px] mt-auto">
            &copy; 2026 Elite Shave Barbería. Control Financiero Inteligente.
          </footer>
        </div>
      );
    }

    // Inicializar y renderizar la App mediante React 18
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
