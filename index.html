<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Manager Pro - Gestión de Energía</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Importar módulos de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // --- CONFIGURACIÓN DE FIREBASE ACTUALIZADA ---
        const myCustomConfig = {
            apiKey: "AIzaSyBIaQoqFI10IQBXVwUDh7bA_0jBVntnZzU",
            authDomain: "solarpro-397be.firebaseapp.com",
            projectId: "solarpro-397be",
            storageBucket: "solarpro-397be.firebasestorage.app",
            messagingSenderId: "107137996727",
            appId: "1:107137996727:web:a03fc9bb9c133321463a32",
            measurementId: "G-E0RV2VSEP7"
        };

        // Lógica de detección de entorno
        let finalConfig;
        try {
            finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myCustomConfig;
        } catch (e) {
            finalConfig = myCustomConfig;
        }

        const app = initializeApp(finalConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'solarpro-397be-main';

        const { useState, useEffect, useMemo, useRef } = React;

        // Componente de Icono estable para React
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        elements: iconRef.current.querySelectorAll('[data-lucide]'),
                        attrs: { 'stroke-width': strokeWidth, width: size, height: size }
                    });
                }
            }, [name, size, strokeWidth]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [clients, setClients] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [finances, setFinances] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [permissionError, setPermissionError] = useState(null);

            // Autenticación (Regla 3: Auth Antes de Queries)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                        setPermissionError("Error de autenticación inicial.");
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Carga de Datos en Tiempo Real (Regla 1 y 3)
            useEffect(() => {
                if (!user) return;
                
                // Ruta estricta (Regla 1)
                const getPath = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);

                const handleError = (error) => {
                    if (error.code === 'permission-denied') {
                        setPermissionError("Permiso denegado: Revisa las reglas de seguridad de Firestore.");
                    }
                    console.error("Firestore Error:", error);
                };

                const unsubClients = onSnapshot(getPath('clients'), 
                    snap => setClients(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    handleError
                );
                const unsubInv = onSnapshot(getPath('inventory'), 
                    snap => setInventory(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    handleError
                );
                const unsubFin = onSnapshot(getPath('finances'), 
                    snap => setFinances(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    handleError
                );

                return () => { unsubClients(); unsubInv(); unsubFin(); };
            }, [user]);

            const deleteItem = async (col, id) => {
                if (!user) return;
                if(window.confirm('¿Deseas eliminar este registro permanentemente?')) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                    } catch (e) {
                        console.error("Error al borrar:", e);
                    }
                }
            };

            const stats = useMemo(() => {
                const inc = finances.filter(f => f.type === 'income').reduce((a, c) => a + (Number(c.amount) || 0), 0);
                const exp = finances.filter(f => f.type === 'expense').reduce((a, c) => a + (Number(c.amount) || 0), 0);
                return { 
                    balance: inc - exp, 
                    clients: clients.length, 
                    stock: inventory.reduce((a, c) => a + (Number(c.stock) || 0), 0) 
                };
            }, [finances, clients, inventory]);

            const NavItem = ({ id, icon, label }) => {
                const active = activeTab === id;
                return (
                    <button onClick={() => setActiveTab(id)} className={`flex flex-col md:flex-row items-center justify-center space-y-1 md:space-y-0 md:space-x-3 px-3 py-2 md:px-5 md:py-2.5 rounded-2xl transition-all ${active ? 'bg-amber-500 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-100'}`}>
                        <Icon name={icon} size={20} />
                        <span className={`text-[10px] md:text-sm font-bold ${active ? 'block' : 'hidden md:block'}`}>{label}</span>
                    </button>
                );
            };

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <Icon name="sun" size={48} className="text-amber-500 animate-spin" />
                    <p className="mt-4 text-slate-400 font-bold uppercase tracking-widest text-[10px]">Conectando con Firebase...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-32 md:pb-12">
                    {/* Alerta de Permisos */}
                    {permissionError && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] bg-rose-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce">
                            <Icon name="alert-triangle" />
                            <span className="font-bold text-sm">{permissionError}</span>
                            <button onClick={() => setPermissionError(null)} className="ml-4 opacity-70 hover:opacity-100"><Icon name="x" size={16}/></button>
                        </div>
                    )}

                    {/* Navegación Desktop */}
                    <nav className="fixed top-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-b z-50 hidden md:flex items-center justify-between px-10">
                        <div className="flex items-center space-x-3">
                            <div className="bg-amber-500 p-2 rounded-xl text-white shadow-lg shadow-amber-200">
                                <Icon name="sun" size={24} />
                            </div>
                            <span className="text-xl font-black tracking-tighter">SOLAR<span className="text-amber-500">PRO</span></span>
                        </div>
                        <div className="flex space-x-2 bg-slate-100/60 p-1.5 rounded-2xl">
                            <NavItem id="dashboard" icon="layout-dashboard" label="Panel" />
                            <NavItem id="clients" icon="users" label="Clientes" />
                            <NavItem id="inventory" icon="package" label="Stock" />
                            <NavItem id="finances" icon="dollar-sign" label="Caja" />
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="h-10 w-10 rounded-2xl bg-gradient-to-tr from-amber-400 to-orange-500 flex items-center justify-center text-white font-black shadow-md">JD</div>
                        </div>
                    </nav>

                    {/* Navegación Mobile */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-lg bg-white/90 backdrop-blur-2xl border shadow-2xl rounded-[2.5rem] z-50 flex items-center justify-around p-3 md:hidden">
                        <NavItem id="dashboard" icon="layout-dashboard" label="Inicio" />
                        <NavItem id="clients" icon="users" label="Clientes" />
                        <NavItem id="inventory" icon="package" label="Stock" />
                        <NavItem id="finances" icon="dollar-sign" label="Dinero" />
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-6 md:px-10 md:pt-28">
                        {activeTab === 'dashboard' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="bg-gradient-to-br from-amber-500 to-orange-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-amber-100 relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h1 className="text-3xl font-black mb-2">Panel de Control</h1>
                                        <p className="opacity-90 font-medium">Gestión inteligente de energía solar.</p>
                                    </div>
                                    <Icon name="sun" size={200} className="absolute -right-10 -top-10 opacity-10" />
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-8 rounded-[2rem] border shadow-sm hover:shadow-xl transition-shadow">
                                        <div className="p-3 bg-emerald-50 text-emerald-600 rounded-2xl w-fit mb-4"><Icon name="trending-up" /></div>
                                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Balance Actual</p>
                                        <h3 className="text-4xl font-black text-slate-800">${stats.balance.toLocaleString('es-MX')}</h3>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border shadow-sm hover:shadow-xl transition-shadow">
                                        <div className="p-3 bg-blue-50 text-blue-600 rounded-2xl w-fit mb-4"><Icon name="users" /></div>
                                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Total Clientes</p>
                                        <h3 className="text-4xl font-black text-slate-800">{stats.clients}</h3>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border shadow-sm hover:shadow-xl transition-shadow">
                                        <div className="p-3 bg-orange-50 text-orange-600 rounded-2xl w-fit mb-4"><Icon name="package" /></div>
                                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Items en Stock</p>
                                        <h3 className="text-4xl font-black text-slate-800">{stats.stock}</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'clients' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                    <h3 className="text-xl font-black mb-8 flex items-center gap-3 text-slate-800"><Icon name="plus" className="text-blue-500" /> Registrar Instalación</h3>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        if (!user) return;
                                        const fd = new FormData(e.target);
                                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), {
                                            name: fd.get('name'), 
                                            phone: fd.get('phone'), 
                                            address: fd.get('address'), 
                                            warranty: fd.get('warranty'), 
                                            date: fd.get('date'), 
                                            panels: fd.get('panels')
                                        });
                                        e.target.reset();
                                    }} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Cliente</label>
                                            <input name="name" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-medium" placeholder="Nombre completo" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Teléfono</label>
                                            <input name="phone" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="+52..." />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Dirección</label>
                                            <input name="address" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Calle, ciudad..." />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Garantía</label>
                                            <input name="warranty" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="10 años" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Paneles</label>
                                            <input name="panels" type="number" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="0" />
                                        </div>
                                        <div className="flex items-end">
                                            <button type="submit" className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">AÑADIR REGISTRO</button>
                                        </div>
                                    </form>
                                </div>
                                <div className="space-y-4">
                                    {clients.map(c => (
                                        <div key={c.id} className="bg-white p-6 rounded-[2rem] border flex flex-col md:flex-row md:items-center justify-between group hover:shadow-md transition-all gap-4">
                                            <div className="flex items-center gap-5">
                                                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center font-black text-2xl shadow-sm">{c.name?.charAt(0)}</div>
                                                <div>
                                                    <h4 className="font-black text-lg text-slate-800 leading-none mb-1">{c.name}</h4>
                                                    <p className="text-xs font-bold text-slate-400">{c.address} • {c.phone}</p>
                                                    <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full mt-2 inline-block">GARANTÍA: {c.warranty}</span>
                                                </div>
                                            </div>
                                            <button onClick={() => deleteItem('clients', c.id)} className="p-3 text-slate-200 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all"><Icon name="trash-2" /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                                    <h3 className="text-xl font-black mb-8 flex items-center gap-3 text-slate-800"><Icon name="package" className="text-orange-500" /> Gestión de Stock</h3>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        if (!user) return;
                                        const fd = new FormData(e.target);
                                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), {
                                            name: fd.get('name'), stock: Number(fd.get('stock')), price: Number(fd.get('price'))
                                        });
                                        e.target.reset();
                                    }} className="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Producto</label>
                                            <input name="name" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-medium" placeholder="Panel 550W" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Unidades</label>
                                            <input name="stock" type="number" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="0" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Costo unitario</label>
                                            <input name="price" type="number" step="0.01" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="0.00" />
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-slate-800 text-white font-black rounded-2xl hover:bg-black transition-all shadow-lg active:scale-95">AGREGAR</button>
                                    </form>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-8 rounded-[2.5rem] border relative group hover:shadow-xl transition-all">
                                            <div className={`absolute top-6 right-6 h-3 w-3 rounded-full ${item.stock < 5 ? 'bg-rose-500 animate-pulse' : 'bg-emerald-500 shadow-sm'}`}></div>
                                            <h4 className="font-black text-slate-800 text-lg mb-1">{item.name}</h4>
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-tighter">Costo: ${item.price?.toLocaleString()}</p>
                                            <div className="mt-8">
                                                <p className="text-4xl font-black text-slate-800">{item.stock} <span className="text-[10px] text-slate-400 font-bold">UNIDADES</span></p>
                                            </div>
                                            <button onClick={() => deleteItem('inventory', item.id)} className="mt-6 text-slate-200 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'finances' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                    <h3 className="text-xl font-black mb-8 flex items-center gap-3 text-slate-800"><Icon name="dollar-sign" className="text-emerald-500" /> Registro Contable</h3>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        if (!user) return;
                                        const fd = new FormData(e.target);
                                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'finances'), {
                                            description: fd.get('description'), 
                                            amount: Number(fd.get('amount')), 
                                            type: fd.get('type'), 
                                            date: new Date().toISOString().split('T')[0]
                                        });
                                        e.target.reset();
                                    }} className="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                                        <div className="space-y-1 lg:col-span-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Concepto</label>
                                            <input name="description" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-medium" placeholder="Venta de kit..." />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Monto ($)</label>
                                            <input name="amount" type="number" step="0.01" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="0.00" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Tipo</label>
                                            <select name="type" className="w-full p-4 bg-slate-50 rounded-2xl outline-none cursor-pointer font-bold">
                                                <option value="income">Ingreso (+)</option>
                                                <option value="expense">Gasto (-)</option>
                                            </select>
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-lg shadow-emerald-100 hover:bg-emerald-700 active:scale-95 transition-all uppercase tracking-widest text-[10px]">Guardar</button>
                                    </form>
                                </div>
                                <div className="bg-white rounded-[2.5rem] border overflow-hidden shadow-sm">
                                    <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Historial Reciente</span>
                                        <span className="font-black text-emerald-600">Balance: ${stats.balance.toLocaleString()}</span>
                                    </div>
                                    <div className="divide-y">
                                        {finances.sort((a,b) => b.id > a.id ? 1 : -1).map(f => (
                                            <div key={f.id} className="flex items-center justify-between p-6 hover:bg-slate-50 transition-colors">
                                                <div className="flex items-center gap-5">
                                                    <div className={`p-3 rounded-2xl ${f.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                        <Icon name={f.type === 'income' ? 'arrow-up-right' : 'arrow-down-right'} />
                                                    </div>
                                                    <div>
                                                        <p className="font-black text-slate-800 leading-none mb-1">{f.description}</p>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase">{f.date}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <span className={`text-lg font-black tabular-nums ${f.type === 'income' ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                        {f.type === 'income' ? '+' : '-'}${f.amount?.toLocaleString('es-MX')}
                                                    </span>
                                                    <button onClick={() => deleteItem('finances', f.id)} className="text-slate-200 hover:text-rose-500 transition-all"><Icon name="trash-2" size={18} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
